services:
  # ──────────────────────────────────────────────
  # 1. PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: mlops_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: mlops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./model_drift_shipping_pipeline/scripts/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 2. Redis Broker (for Celery)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mlops_redis_broker
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 3. MLflow Tracking Server
  # ──────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlops_mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts

  # ──────────────────────────────────────────────
  # 4. FastAPI Backend (Serving Gateway)
  # ──────────────────────────────────────────────
  backend_api:
    build: ./model_drift_shipping_pipeline
    container_name: mlops_fastapi_api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./model_drift_shipping_pipeline:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/mlops_db
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

  # ──────────────────────────────────────────────
  # 5. Celery Worker (Drift Analysis / Retraining)
  # ──────────────────────────────────────────────
  celery_worker:
    build: ./model_drift_shipping_pipeline
    container_name: mlops_celery_worker
    command: celery -A backend.worker.celery_app worker --loglevel=info
    volumes:
      - ./model_drift_shipping_pipeline:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/mlops_db
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

volumes:
  postgres_data:
  mlflow_data:
